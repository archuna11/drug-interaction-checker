<!DOCTYPE html>
<html>
<head>
<title>Drug Interaction Checker</title>

<style>
body {
    font-family: "Segoe UI";
    background: linear-gradient(135deg, #e6ecf3, #d8e3f0);
    margin: 0;
}

.header {
    text-align: center;
    font-size: 28px;
    padding: 20px;
    font-weight: bold;
}

.section {
    width: 85%;
    margin: 20px auto;
    background: rgba(255,255,255,0.6);
    padding: 20px;
    border-radius: 18px;
}

.input-box {
    display: flex;
    margin-top: 15px;
}

.input-box input {
    flex: 1;
    padding: 12px;
    border-radius: 12px;
    border: none;
}

.input-box button {
    margin-left: 10px;
    padding: 12px;
    border-radius: 10px;
}

.chips {
    margin-top: 10px;
}

.chip {
    display: inline-flex;
    align-items: center;
    background: white;
    padding: 6px 12px;
    border-radius: 20px;
    margin-right: 6px;
    gap: 6px;
}

.remove {
    color: red;
    cursor: pointer;
}

.analyze-btn {
    display: block;
    margin: 20px auto;
    padding: 12px 30px;
    background: #2ecc71;
    border: none;
    color: white;
    border-radius: 10px;
}

.drug-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.drug-card {
    background: white;
    padding: 15px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.6;
}

.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
}

.tab {
    padding: 8px 16px;
    background: #eee;
    border-radius: 20px;
    cursor: pointer;
    border: none;
    font-size: 14px;
}

.tab.active {
    background: #f4c7c7;
}

.interaction {
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 10px;
}

.severe { background: #ffecec; border-left: 5px solid red; }
.moderate { background: #fff4e5; border-left: 5px solid orange; }
.minor { background: #e8f8f5; border-left: 5px solid green; }

h4 {
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="header">💊 Drug Interaction Checker</div>

<div class="section">
    <h3>Add Drugs</h3>

    <div style="text-align:center; margin-bottom:10px;">
        <input type="file" id="fileInput" accept=".pdf,.png,.jpg,.jpeg">
        <button onclick="uploadFile()">Upload Prescription</button>

        <div style="font-size:12px; color:#555; margin-top:5px;">
            ⚠️ Works best for printed prescriptions
        </div>
    </div>

    <div style="text-align:center; margin:10px;">OR</div>

    <div class="input-box">
        <input id="drugInput" placeholder="Enter drug (e.g., Telma)">
        <button onclick="addDrug()">Add</button>
    </div>

    <div id="chips" class="chips"></div>

    <button class="analyze-btn" onclick="analyze()">Analyze</button>
</div>

<div class="section" id="drugSection" style="display:none;">
    <h3>Drug Information</h3>
    <div id="drugCards" class="drug-grid"></div>
</div>

<div class="section" id="interactionSection" style="display:none;">

    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>Interaction Results</h3>
        <select id="modeSelect" onchange="changeMode()">
            <option value="doctor">👨‍⚕️ Doctor</option>
            <option value="patient">👤 Patient</option>
        </select>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showTab('ddi', this)">Drug-Drug</div>
        <div class="tab" onclick="showTab('food', this)">Drug-Food</div>
        <div class="tab" onclick="showTab('disease', this)">Drug-Disease</div>
    </div>

    <div id="ddi"></div>
    <div id="food" style="display:none;"></div>
    <div id="disease" style="display:none;"></div>
</div>

<script>

let selectedDrugs = [];
let viewMode = "doctor";

function addDrug(){
    let input = document.getElementById("drugInput").value.trim().toLowerCase();
    if(!input) return;

    if(selectedDrugs.includes(input)){
        alert("Already added");
        return;
    }

    selectedDrugs.push(input);
    document.getElementById("drugInput").value = "";
    renderChips();
}

document.getElementById("drugInput").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        addDrug();
    }
});

function removeDrug(i){
    selectedDrugs.splice(i,1);
    renderChips();
}

function renderChips(){
    let c = document.getElementById("chips");
    c.innerHTML = "";

    selectedDrugs.forEach((d,i)=>{
        c.innerHTML += `
        <span class="chip">
            ${d}
            <span class="remove" onclick="removeDrug(${i})">✖</span>
        </span>`;
    });
}

function changeMode(){
    viewMode = document.getElementById("modeSelect").value;

    renderInteractions(window.lastDDI || [], "ddi");
    renderInteractions(window.lastFood || [], "food");
    renderInteractions(window.lastDisease || [], "disease");
}

function analyze(){

    if(selectedDrugs.length === 0){
        alert("Add at least one drug");
        return;
    }

    // ✅ SHOW UI IMMEDIATELY
    document.getElementById("drugSection").style.display = "block";
    document.getElementById("interactionSection").style.display = "block";

    // ✅ LOADING STATE
    document.getElementById("drugCards").innerHTML = "⏳ Loading...";
    document.getElementById("ddi").innerHTML = "⏳ Checking interactions...";
    document.getElementById("food").innerHTML = "";
    document.getElementById("disease").innerHTML = "";

    fetch("/analyze", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({drugs:selectedDrugs})
    })
    .then(res=>res.json())
    .then(data=>{

        window.lastDDI = data.interactions || [];
        window.lastFood = data.food_interactions || [];
        window.lastDisease = data.disease_interactions || [];

        renderDrugs(data.drugs || []);
        renderInteractions(window.lastDDI, "ddi");
        renderInteractions(window.lastFood, "food");
        renderInteractions(window.lastDisease, "disease");

    })
    .catch(err=>{
        console.error(err);
        alert("Error occurred");
    });
}

function uploadFile(){

    let file = document.getElementById("fileInput").files[0];

    if(!file){
        alert("Please select a file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);

    document.getElementById("drugCards").innerHTML = "⏳ Extracting drugs...";

    fetch("/upload", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("drugSection").style.display = "block";
        document.getElementById("interactionSection").style.display = "block";

        if(data.detected_drugs){
            selectedDrugs = data.detected_drugs;
            renderChips();
        }

        if(data.analysis){
            window.lastDDI = data.analysis.interactions || [];
            window.lastFood = data.analysis.food_interactions || [];
            window.lastDisease = data.analysis.disease_interactions || [];

            renderDrugs(data.analysis.drugs || []);
            renderInteractions(data.analysis.interactions || [], "ddi");
            renderInteractions(data.analysis.food_interactions || [], "food");
            renderInteractions(data.analysis.disease_interactions || [], "disease");
        }

    })
    .catch(err=>{
        console.error(err);
        alert("Upload failed");
    });
}

function renderDrugs(drugs){
    let c = document.getElementById("drugCards");
    c.innerHTML = "";

    drugs.forEach(d=>{
        c.innerHTML += `
        <div class="drug-card">
            <b>${d.drug_name}</b><br>
            <b>Uses:</b> ${d.summary}<br>
            <b>Dosage:</b> ${d.dosage}<br>
            <b>Side Effects:</b> ${d.side_effects}
        </div>`;
    });
}

function toPatientView(i){

    let sev = (i.severity || "minor").toLowerCase();

    let description = "";
    let recommendation = "";

    if(sev === "major" || sev === "severe"){
        description = "🚨 These medicines can interact in a serious way and may harm you.";
        recommendation = "⚠️ Do NOT take them together without medical advice. Please contact your doctor immediately.";
    }
    else if(sev === "moderate"){
        description = "⚠️ These medicines may interact and cause unwanted side effects.";
        recommendation = "👉 Use with caution. Talk to your doctor if you notice anything unusual.";
    }
    else{
        description = "🟢 These medicines are generally safe to take together.";
        recommendation = "✅ Continue as prescribed, but stay alert for any unusual symptoms.";
    }

    return {
        ...i,
        description,
        recommendation
    };
}

function renderInteractions(list, id){

    // ✅ Patient mode ONLY for Drug-Drug
    if(viewMode === "patient" && id === "ddi"){
        list = list.map(toPatientView);
    }

    let c = document.getElementById(id);
    c.innerHTML = "";

    if(list.length === 0){
        c.innerHTML = "<p>✅ No interactions found</p>";
        return;
    }

    // ✅ GROUPING LOGIC
    let critical = [], moderate = [], minor = [];

    list.forEach(i=>{
        let sev = (i.severity || "minor").toLowerCase();

        if(sev === "major" || sev === "severe") critical.push(i);
        else if(sev === "moderate") moderate.push(i);
        else minor.push(i);
    });

    function block(i){

        let name = id==="ddi"
            ? `${i.drug1} + ${i.drug2}`
            : id==="food"
            ? `${i.drug} + Food`
            : `${i.drug} + ${i.condition}`;

        // ✅ FIX CSS mismatch (major → severe)
        let sevClass = (i.severity || "minor").toLowerCase();
        if(sevClass === "major") sevClass = "severe";

        return `
        <div class="interaction ${sevClass}">
            <b>${name}</b><br>
            <b>Severity:</b> ${i.severity}<br>
            ${i.description}<br>
            <b>Advice:</b> ${i.recommendation}
        </div>`;
    }

    function section(title, items){
        if(items.length === 0) return "";
        return `<h4>${title}</h4>` + items.map(block).join("");
    }

    // ✅ FINAL OUTPUT (GROUPED)
    c.innerHTML += section("🚨 Critical Alerts", critical);
    c.innerHTML += section("⚠️ Moderate Warnings", moderate);
    c.innerHTML += section("🟢 Minor / Safe", minor);
}

function showTab(id, el){
    document.getElementById("ddi").style.display = "none";
    document.getElementById("food").style.display = "none";
    document.getElementById("disease").style.display = "none";

    document.getElementById(id).style.display = "block";

    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}

</script>

</body>
</html>
